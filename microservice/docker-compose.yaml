services:

  mongo:
    image: mongo:6.0
    container_name: picpay-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: picpay-mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ner-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: picpay-ner-service
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      MLFLOW_HOST: ${MLFLOW_HOST:-mlflow}
      MLFLOW_PORT: ${MLFLOW_PORT:-5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-ner-inference-service}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-picpay_ner}
      SERVICE_NAME: ${SERVICE_NAME:-picpay-ner-service}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
    depends_on:
      mongo:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  mlflow_data:
    driver: local